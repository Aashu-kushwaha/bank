<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Ledger Bank</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; padding: 20px 0; }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius2); padding: 48px 40px;
      box-shadow: var(--shadow), 0 0 80px rgba(201,168,76,0.05);
      animation: fadeUp 0.6s ease;
    }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .logo-text h1 {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text p { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

    .page-title { font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; }
    .page-sub   { font-size: 0.875rem; color: var(--text2); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2);
      margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    input {
      width: 100%; padding: 14px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.925rem;
      transition: all 0.2s; outline: none;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    input::placeholder { color: var(--text3); }

    .btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none; border-radius: var(--radius);
      color: #1a1400; font-weight: 700; font-size: 0.925rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px; letter-spacing: 0.02em;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-outline {
      width: 100%; padding: 13px;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text2);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    .divider {
      text-align: center; margin: 24px 0; color: var(--text3); font-size: 0.8rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 24px); height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-text { text-align: center; font-size: 0.875rem; color: var(--text2); }
    .link-text a { color: var(--gold); font-weight: 500; }

    .error-msg {
      background: var(--red-dim); border: 1px solid var(--red); color: var(--red);
      padding: 12px 16px; border-radius: var(--radius); font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }
    .success-msg {
      background: var(--green-dim); border: 1px solid var(--green); color: var(--green);
      padding: 12px 16px; border-radius: var(--radius); font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }

    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }

    /* OTP input styling */
    .otp-info {
      background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius); padding: 12px 16px;
      margin-bottom: 20px; font-size: 0.85rem; color: var(--gold);
      display: flex; align-items: center; gap: 8px;
    }

    /* Timer */
    .timer { font-size: 0.8rem; color: var(--text3); text-align: center; margin-top: 10px; }
    .timer span { color: var(--gold); font-weight: 600; }

    /* Step indicator */
    .steps {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 28px;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 500; color: var(--text3);
    }
    .step-dot {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
    }
    .step.active .step-dot { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .step.done .step-dot   { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .step.active { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div id="toast-container"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">₹</div>
      <div class="logo-text">
        <h1>morepay</h1>
        <p>Secure Banking</p>
      </div>
    </div>

    <!-- Step indicator -->
    <div class="steps">
      <div class="step active" id="step1-indicator">
        <div class="step-dot">1</div>
        Details
      </div>
      <div class="step-line"></div>
      <div class="step" id="step2-indicator">
        <div class="step-dot">2</div>
        Verify OTP
      </div>
    </div>

    <h2 class="page-title" id="page-title">Create account</h2>
    <p class="page-sub" id="page-sub">Start banking with Ledger today</p>

    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <!-- Step 1: Details form -->
    <div id="step1">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your Full name" autocomplete="name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div style="position:relative">
          <input type="password" id="password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
          <button type="button" onclick="togglePassword('password', this)"
            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
            background:none;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:0">
            👁
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <button class="btn" id="send-otp-btn" onclick="handleSendOTP()">
        Send OTP to Email
      </button>
    </div>

    <!-- Step 2: OTP form -->
    <div id="step2" style="display:none">
      <div class="otp-info">
        ✉ OTP sent to <strong id="otp-email-display"></strong>
      </div>

      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" autocomplete="one-time-code">
      </div>

      <div class="timer">OTP expires in <span id="countdown">5:00</span></div>

      <button class="btn" id="verify-btn" onclick="handleRegister()" style="margin-top:16px">
        Verify & Create Account
      </button>

      <button class="btn-outline" id="resend-btn" onclick="handleResendOTP()">
        Resend OTP
      </button>

      <button class="btn-outline" onclick="goBack()" style="margin-top:4px">
        ← Back
      </button>
    </div>

    <div class="divider">or</div>
    <div class="link-text">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script type="module">
    import { authAPI } from '../services/api.js';
    import { saveSession, isLoggedIn } from '../utils/auth.js';

    if (isLoggedIn()) window.location.href = 'dashboard.html';

    let timerInterval = null;

    // ── Password strength ─────────────────────────────────────────
    window.checkStrength = function(val) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const widths = ['0%', '25%', '50%', '75%', '100%'];
      const colors = ['', '#e05555', '#e8a84c', '#c9a84c', '#4caf7a'];
      fill.style.width      = widths[score];
      fill.style.background = colors[score];
    };

    // ── Helpers ───────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }

    function clearMessages() {
      document.getElementById('error-msg').style.display   = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }

    // ── OTP Countdown Timer ───────────────────────────────────────
    function startTimer(seconds = 300) {
      clearInterval(timerInterval);
      const el = document.getElementById('countdown');
      let remaining = seconds;

      timerInterval = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        el.textContent = `${m}:${s.toString().padStart(2, '0')}`;

        if (remaining <= 0) {
          clearInterval(timerInterval);
          el.textContent = 'Expired';
          el.style.color = 'var(--red)';
          document.getElementById('verify-btn').disabled = true;
          showError('OTP has expired. Please resend.');
        }
      }, 1000);
    }

    // ── Step 1: Send OTP ──────────────────────────────────────────
    window.handleSendOTP = async function() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('send-otp-btn');

      clearMessages();

      if (!name)              return showError('Please enter your full name.');
      if (!email)             return showError('Please enter your email.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending OTP...';

      try {
        await authAPI.sendOTP(email);

        // Switch to step 2
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('otp-email-display').textContent = email;
        document.getElementById('page-title').textContent = 'Verify your email';
        document.getElementById('page-sub').textContent   = 'Enter the OTP sent to your email';

        // Update step indicators
        document.getElementById('step1-indicator').classList.remove('active');
        document.getElementById('step1-indicator').classList.add('done');
        document.getElementById('step2-indicator').classList.add('active');

        showSuccess('OTP sent successfully! Check your email.');
        startTimer(300);

      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = 'Send OTP to Email';
      }
    };

    // ── Step 2: Verify OTP & Register ─────────────────────────────
    window.handleRegister = async function() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const otp      = document.getElementById('otp').value.trim();
      const btn      = document.getElementById('verify-btn');

      clearMessages();

      if (!otp) return showError('Please enter the OTP.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';

      try {
        const data = await authAPI.register(name, email, password, otp);
        clearInterval(timerInterval);
        saveSession(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = 'Verify & Create Account';
      }
    };

    // ── Resend OTP ────────────────────────────────────────────────
    window.handleResendOTP = async function() {
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('resend-btn');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Resending...';
      clearMessages();

      try {
        await authAPI.sendOTP(email);
        showSuccess('New OTP sent to your email.');
        document.getElementById('countdown').style.color = '';
        document.getElementById('verify-btn').disabled = false;
        startTimer(300);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Resend OTP';
      }
    };

    // ── Go Back ───────────────────────────────────────────────────
    window.goBack = function() {
      clearInterval(timerInterval);
      clearMessages();
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step1').style.display = 'block';
      document.getElementById('page-title').textContent = 'Create account';
      document.getElementById('page-sub').textContent   = 'Start banking with Ledger today';
      document.getElementById('step1-indicator').classList.add('active');
      document.getElementById('step1-indicator').classList.remove('done');
      document.getElementById('step2-indicator').classList.remove('active');
      document.getElementById('send-otp-btn').disabled = false;
      document.getElementById('send-otp-btn').innerHTML = 'Send OTP to Email';
    };
    window.togglePassword = function(inputId, btn) {
  const input = document.getElementById(inputId)
  if (input.type === 'password') {
    input.type = 'text'
    btn.textContent = '🙈'
  } else {
    input.type = 'password'
    btn.textContent = '👁'
  }
}
  </script>
</body>
</html>

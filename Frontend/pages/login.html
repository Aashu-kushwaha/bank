<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ledger Bank</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
  body { 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  min-height: 100vh; 
  overflow: auto; /* ← change from hidden to auto */
  padding: 20px 0; /* ← add padding */
}

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 48px 40px;
      box-shadow: var(--shadow), 0 0 80px rgba(201,168,76,0.05);
      animation: fadeUp 0.6s ease;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .logo-text p { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

    .page-title { font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; }
    .page-sub   { font-size: 0.875rem; color: var(--text2); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: var(--text2); margin-bottom: 8px; letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%; padding: 14px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 0.925rem; transition: all 0.2s;
      outline: none;
    }

    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    input::placeholder { color: var(--text3); }

    .btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none; border-radius: var(--radius);
      color: #1a1400; font-weight: 700; font-size: 0.925rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px; letter-spacing: 0.02em;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center; margin: 24px 0;
      color: var(--text3); font-size: 0.8rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 24px); height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-text {
      text-align: center; font-size: 0.875rem; color: var(--text2);
    }
    .link-text a { color: var(--gold); font-weight: 500; }
    .link-text a:hover { color: var(--gold2); }

    .error-msg {
      background: var(--red-dim); border: 1px solid var(--red);
      color: var(--red); padding: 12px 16px;
      border-radius: var(--radius); font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div id="toast-container"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">₹</div>
      <div class="logo-text">
        <h1>morepay</h1>
        <p>Secure Banking</p>
      </div>
    </div>

    <h2 class="page-title">Welcome back</h2>
    <p class="page-sub">Sign in to your account</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" onclick="togglePassword('password', this)" 
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
          background:none;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:0">
          👁
        </button>
      </div>
    </div>

    <button class="btn" id="login-btn" onclick="handleLogin()">
      Sign In
    </button>

    <div class="divider">or</div>

    <div class="link-text">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script type="module">
    import { authAPI } from '../services/api.js';
    import { saveSession, isLoggedIn } from '../utils/auth.js';

    if (isLoggedIn()) window.location.href = 'dashboard.html';

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    window.handleLogin = async function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      document.getElementById('error-msg').style.display = 'none';

      if (!email || !password) return showError('Please fill in all fields.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const data = await authAPI.login(email, password);
        saveSession(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });

    window.togglePassword = function(inputId, btn) {
  const input = document.getElementById(inputId)
  if (input.type === 'password') {
    input.type = 'text'
    btn.textContent = '🙈'
  } else {
    input.type = 'password'
    btn.textContent = '👁'
  }
}
  </script>
</body>
</html>

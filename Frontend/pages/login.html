<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ledger Bank</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; padding: 20px 0; }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius2); padding: 48px 40px;
      box-shadow: var(--shadow), 0 0 80px rgba(201,168,76,0.05);
      animation: fadeUp 0.6s ease;
    }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .logo-text h1 {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text p { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

    .page-title { font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; }
    .page-sub   { font-size: 0.875rem; color: var(--text2); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2);
      margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    input {
      width: 100%; padding: 14px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.925rem;
      transition: all 0.2s; outline: none;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    input::placeholder { color: var(--text3); }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: 1rem; padding: 0; transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }

    .forgot-link {
      text-align: right; margin-top: -12px; margin-bottom: 20px;
    }
    .forgot-link a {
      font-size: 0.8rem; color: var(--gold); cursor: pointer;
    }
    .forgot-link a:hover { color: var(--gold2); }

    .btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none; border-radius: var(--radius);
      color: #1a1400; font-weight: 700; font-size: 0.925rem;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-outline {
      width: 100%; padding: 13px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text2); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .divider {
      text-align: center; margin: 24px 0; color: var(--text3); font-size: 0.8rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 24px); height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-text { text-align: center; font-size: 0.875rem; color: var(--text2); }
    .link-text a { color: var(--gold); font-weight: 500; }

    .error-msg {
      background: var(--red-dim); border: 1px solid var(--red); color: var(--red);
      padding: 12px 16px; border-radius: var(--radius); font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }
    .success-msg {
      background: var(--green-dim); border: 1px solid var(--green); color: var(--green);
      padding: 12px 16px; border-radius: var(--radius); font-size: 0.85rem;
      margin-bottom: 20px; display: none;
    }

    .timer { font-size: 0.8rem; color: var(--text3); text-align: center; margin-top: 10px; }
    .timer span { color: var(--gold); font-weight: 600; }

    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div id="toast-container"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">₹</div>
      <div class="logo-text">
        <h1>morepay</h1>
        <p>Secure Banking</p>
      </div>
    </div>

    <h2 class="page-title" id="page-title">Welcome back</h2>
    <p class="page-sub" id="page-sub">Sign in to your account</p>

    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <!-- Step 1: Login form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePassword('password', this)">👁</button>
        </div>
      </div>
      <div class="forgot-link">
        <a onclick="showForgotPassword()">Forgot password?</a>
      </div>
      <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="divider">or</div>
      <div class="link-text">Don't have an account? <a href="register.html">Create one</a></div>
    </div>

    <!-- Step 2: Forgot Password - Enter Email -->
    <div id="forgot-form" style="display:none">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="forgot-email" placeholder="you@example.com">
      </div>
      <button class="btn" id="forgot-btn" onclick="handleForgotPassword()">Send OTP</button>
      <button class="btn-outline" onclick="showLogin()">← Back to Login</button>
    </div>

    <!-- Step 3: Verify OTP -->
    <div id="otp-form" style="display:none">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" id="reset-otp" placeholder="6-digit OTP" maxlength="6">
      </div>
      <div class="timer">OTP expires in <span id="countdown">5:00</span></div>
      <button class="btn" id="verify-otp-btn" onclick="handleVerifyOTP()" style="margin-top:16px">Verify OTP</button>
      <button class="btn-outline" id="resend-btn" onclick="handleResendOTP()">Resend OTP</button>
      <button class="btn-outline" onclick="showLogin()">← Back to Login</button>
    </div>

    <!-- Step 4: New Password -->
    <div id="reset-form" style="display:none">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" id="new-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn" onclick="togglePassword('new-password', this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirm-password" placeholder="Re-enter password">
          <button type="button" class="eye-btn" onclick="togglePassword('confirm-password', this)">👁</button>
        </div>
      </div>
      <button class="btn" id="reset-btn" onclick="handleResetPassword()">Reset Password</button>
      <button class="btn-outline" onclick="showLogin()">← Back to Login</button>
    </div>
  </div>

  <script type="module">
    import { authAPI } from '../services/api.js';
    import { saveSession, isLoggedIn } from '../utils/auth.js';

    if (isLoggedIn()) window.location.href = 'dashboard.html';

    let resetEmail = null
    let timerInterval = null

    // ── Helpers ───────────────────────────────────────
    function showError(msg) {
      document.getElementById('error-msg').textContent = msg
      document.getElementById('error-msg').style.display = 'block'
      document.getElementById('success-msg').style.display = 'none'
    }

    function showSuccess(msg) {
      document.getElementById('success-msg').textContent = msg
      document.getElementById('success-msg').style.display = 'block'
      document.getElementById('error-msg').style.display = 'none'
    }

    function clearMessages() {
      document.getElementById('error-msg').style.display = 'none'
      document.getElementById('success-msg').style.display = 'none'
    }

    function hideAll() {
      document.getElementById('login-form').style.display  = 'none'
      document.getElementById('forgot-form').style.display = 'none'
      document.getElementById('otp-form').style.display    = 'none'
      document.getElementById('reset-form').style.display  = 'none'
      clearMessages()
    }

    // ── Show sections ─────────────────────────────────
    window.showLogin = function() {
      clearInterval(timerInterval)
      hideAll()
      document.getElementById('login-form').style.display = 'block'
      document.getElementById('page-title').textContent = 'Welcome back'
      document.getElementById('page-sub').textContent   = 'Sign in to your account'
    }

    window.showForgotPassword = function() {
      hideAll()
      document.getElementById('forgot-form').style.display = 'block'
      document.getElementById('page-title').textContent = 'Forgot password'
      document.getElementById('page-sub').textContent   = 'Enter your email to receive an OTP'
    }

    // ── Password strength ─────────────────────────────
    window.checkStrength = function(val) {
      const fill = document.getElementById('strength-fill')
      let score = 0
      if (val.length >= 8) score++
      if (/[A-Z]/.test(val)) score++
      if (/[0-9]/.test(val)) score++
      if (/[^A-Za-z0-9]/.test(val)) score++
      const widths = ['0%', '25%', '50%', '75%', '100%']
      const colors = ['', '#e05555', '#e8a84c', '#c9a84c', '#4caf7a']
      fill.style.width      = widths[score]
      fill.style.background = colors[score]
    }

    // ── Eye toggle ────────────────────────────────────
    window.togglePassword = function(inputId, btn) {
      const input = document.getElementById(inputId)
      if (input.type === 'password') {
        input.type = 'text'
        btn.textContent = '🙈'
      } else {
        input.type = 'password'
        btn.textContent = '👁'
      }
    }

    // ── Timer ─────────────────────────────────────────
    function startTimer(seconds = 300) {
      clearInterval(timerInterval)
      const el = document.getElementById('countdown')
      let remaining = seconds
      timerInterval = setInterval(() => {
        remaining--
        const m = Math.floor(remaining / 60)
        const s = remaining % 60
        el.textContent = `${m}:${s.toString().padStart(2, '0')}`
        if (remaining <= 0) {
          clearInterval(timerInterval)
          el.textContent = 'Expired'
          el.style.color = 'var(--red)'
          document.getElementById('verify-otp-btn').disabled = true
          showError('OTP has expired. Please resend.')
        }
      }, 1000)
    }

    // ── Login ─────────────────────────────────────────
    window.handleLogin = async function() {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('login-btn')

      clearMessages()
      if (!email || !password) return showError('Please fill in all fields.')

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span> Signing in...'

      try {
        const data = await authAPI.login(email, password)
        saveSession(data.token, data.user)
        window.location.href = 'dashboard.html'
      } catch (err) {
        showError(err.message)
        btn.disabled = false
        btn.innerHTML = 'Sign In'
      }
    }

    // ── Forgot Password Step 1 ────────────────────────
    window.handleForgotPassword = async function() {
      const email = document.getElementById('forgot-email').value.trim()
      const btn   = document.getElementById('forgot-btn')

      clearMessages()
      if (!email) return showError('Please enter your email.')

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span> Sending OTP...'

      try {
        await authAPI.forgotPassword(email)
        resetEmail = email

        hideAll()
        document.getElementById('otp-form').style.display = 'block'
        document.getElementById('page-title').textContent = 'Verify OTP'
        document.getElementById('page-sub').textContent   = `OTP sent to ${email}`
        document.getElementById('countdown').style.color  = ''
        document.getElementById('verify-otp-btn').disabled = false
        showSuccess('OTP sent to your email!')
        startTimer(300)

      } catch (err) {
        showError(err.message)
        btn.disabled = false
        btn.innerHTML = 'Send OTP'
      }
    }

    // ── Forgot Password Step 2 - Verify OTP ──────────
    window.handleVerifyOTP = async function() {
  const otp = document.getElementById('reset-otp').value.trim()

  clearMessages()
  if (!otp) return showError('Please enter the OTP.')
  if (otp.length !== 6) return showError('OTP must be 6 digits.')

  // ✅ Just store OTP and move to next step — no separate verify call needed
  clearInterval(timerInterval)
  hideAll()
  document.getElementById('reset-form').style.display = 'block'
  document.getElementById('page-title').textContent = 'New Password'
  document.getElementById('page-sub').textContent   = 'Enter your new password'
}

    // ── Resend OTP ────────────────────────────────────
    window.handleResendOTP = async function() {
      const btn = document.getElementById('resend-btn')
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span> Resending...'
      clearMessages()

      try {
        await authAPI.forgotPassword(resetEmail)
        showSuccess('New OTP sent!')
        document.getElementById('countdown').style.color = ''
        document.getElementById('verify-otp-btn').disabled = false
        startTimer(300)
      } catch (err) {
        showError(err.message)
      } finally {
        btn.disabled = false
        btn.innerHTML = 'Resend OTP'
      }
    }

    // ── Reset Password ────────────────────────────────
    window.handleResetPassword = async function() {
      const otp         = document.getElementById('reset-otp').value.trim()
      const newPassword = document.getElementById('new-password').value
      const confirmPass = document.getElementById('confirm-password').value
      const btn         = document.getElementById('reset-btn')

      clearMessages()
      if (!newPassword)              return showError('Please enter a new password.')
      if (newPassword.length < 8)    return showError('Password must be at least 8 characters.')
      if (newPassword !== confirmPass) return showError('Passwords do not match.')

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span> Resetting...'

      try {
        await authAPI.resetPassword(resetEmail, otp, newPassword)
        hideAll()
        document.getElementById('login-form').style.display = 'block'
        document.getElementById('page-title').textContent = 'Welcome back'
        document.getElementById('page-sub').textContent   = 'Sign in to your account'
        showSuccess('Password reset successfully! Please login.')
      } catch (err) {
        showError(err.message)
        btn.disabled = false
        btn.innerHTML = 'Reset Password'
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginForm = document.getElementById('login-form')
        if (loginForm.style.display !== 'none') window.handleLogin()
      }
    })
  </script>
</body>
</html>
